services:
  - type: web
    name: n8n-seuup
    env: docker
    plan: starter
    dockerfilePath: ./Dockerfile
    envVars:
      # متغيرات البيئة الأساسية لـ n8n
      - key: N8N_HOST
        value: 0.0.0.0
      - key: N8N_PORT
        value: 5678
      - key: WEBHOOK_URL
        value: https://n8n-seuup.onrender.com
      - key: N8N_TRUST_PROXY
        value: "true"
      # إضافة متغير NODE_OPTIONS الضروري لتجنب أخطاء الذاكرة
      - key: NODE_OPTIONS
        value: "--max-old-space-size=512"
      - key: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
        value: "true"
      - key: N8N_ENCRYPTION_KEY
        value: Djfhurerhr638dhfbhr7h37urhr7urhr7
      # متغيرات المصادقة (Authentication)
      - key: N8N_BASIC_AUTH_ACTIVE
        value: "true"
      - key: N8N_BASIC_AUTH_USER
        value: "admin"
      - key: N8N_BASIC_AUTH_PASSWORD
        value: admin518n518
      # تكوين قاعدة بيانات PostgreSQL على Supabase
      - key: DB_TYPE
        value: postgresdb
      - key: DB_POSTGRESDB_HOST
        value: db.ezbubjsdiuwmigbsmxit.supabase.co
      - key: DB_POSTGRESDB_PORT
        value: 5432
      - key: DB_POSTGRESDB_DATABASE
        value: postgres
      - key: DB_POSTGRESDB_USER
        value: postgres
      - key: DB_POSTGRESDB_PASSWORD
        value: Asd050427Asd
      # إعدادات SSL الضرورية للاتصال بقواعد البيانات السحابية
      - key: DB_POSTGRESDB_SSL_REJECT_UNAUTHORIZED
        value: "false"
      
      # متغيرات Google OAuth
      - key: N8N_GOOGLE_CLIENT_ID
        value: 975198101061-ta23p75oo04d9g6llvj0m5r0io0u9civ.apps.googleusercontent.com
      - key: N8N_GOOGLE_CLIENT_SECRET
        value: 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
